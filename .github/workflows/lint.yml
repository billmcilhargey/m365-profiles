name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Quality checks + build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run quality checks (validate-tree + typecheck + lint + format)
        run: npm run check

      - name: Run unit tests (tree walk + state invariants)
        run: npm run test:walk && npm run test:state

      # validate-tree already ran inside `npm run check` above — call astro
      # build directly to avoid running it a second time.
      - name: Build (also type-checks pages)
        run: npx astro build

      - name: Validate built site (broken-link scan)
        run: npm run test:links

  links:
    name: Link check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run lychee link checker
        uses: lycheeverse/lychee-action@v2
        with:
          fail: false
          args: >-
            --no-progress
            --max-concurrency 4
            --accept 200,206,403,429
            --exclude-path node_modules
            --exclude-path dist
            --exclude-path .astro
            './**/*.md'
            './src/**/*.astro'
            './src/**/*.mdx'

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run dependency-review-action
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

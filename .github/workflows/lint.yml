name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Least-privilege: linting only needs read access to the repo content.
permissions:
  contents: read

jobs:
  htmlhint:
    name: HTMLHint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install HTMLHint
        run: npm install --no-save htmlhint@1.1.4

      - name: Run HTMLHint
        run: npx htmlhint "**/*.html" --ignore "node_modules/**"

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: '**/*.md'

  links:
    name: Link check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run lychee link checker
        uses: lycheeverse/lychee-action@v2
        with:
          # Don't fail the run if a single doc link is temporarily down; still report.
          fail: false
          args: "--no-progress --max-concurrency 4 --accept 200,206,403,429 --exclude-path node_modules './**/*.md' './**/*.html'"

name: Deploy

# Build → validate → publish to GitHub Pages → tag CalVer release.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or commit SHA to deploy (optional)"
        required: false
        default: ""

permissions: {}

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build:
    name: Build and validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.ver.outputs.tag }}
      build_date: ${{ steps.ver.outputs.iso }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Compute CalVer version
        id: ver
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail
          date_part="$(date -u +%Y.%m.%d)"
          iso="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          tag="v${date_part}-${RUN_NUMBER}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "iso=$iso" >> "$GITHUB_OUTPUT"
          echo "Computed: $tag ($iso)"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Cache Astro build outputs
        uses: actions/cache@v5
        with:
          path: |
            .astro
            node_modules/.astro
          key: astro-${{ runner.os }}-${{ hashFiles('package-lock.json', 'astro.config.mjs') }}-${{ hashFiles('src/**', 'public/**') }}
          restore-keys: |
            astro-${{ runner.os }}-${{ hashFiles('package-lock.json', 'astro.config.mjs') }}-

      - name: Validate decision tree
        run: npm run validate-tree

      - name: Run quality checks (typecheck + lint + format)
        run: |
          npm run typecheck
          npm run lint
          npm run format

      - name: Resolve site URL and base
        id: site
        # Defaults from src/lib/config.js; override via Actions vars
        # PUBLIC_SITE_URL / PUBLIC_SITE_BASE for forks.
        env:
          OVERRIDE_URL: ${{ vars.PUBLIC_SITE_URL }}
          OVERRIDE_BASE: ${{ vars.PUBLIC_SITE_BASE }}
        run: |
          set -euo pipefail
          default_url="$(node -e 'import("./src/lib/config.js").then(m=>process.stdout.write(m.CONFIG.origin))')"
          default_base="$(node -e 'import("./src/lib/config.js").then(m=>process.stdout.write(m.CONFIG.base))')"
          url="${OVERRIDE_URL:-$default_url}"
          base="${OVERRIDE_BASE:-$default_base}"
          echo "url=$url"   >> "$GITHUB_OUTPUT"
          echo "base=$base" >> "$GITHUB_OUTPUT"
          echo "Resolved site=$url base=$base"

      - name: Build Astro site
        env:
          PUBLIC_APP_VERSION: ${{ steps.ver.outputs.tag }}
          PUBLIC_BUILD_DATE: ${{ steps.ver.outputs.iso }}
          PUBLIC_SITE_URL: ${{ steps.site.outputs.url }}
          PUBLIC_SITE_BASE: ${{ steps.site.outputs.base }}
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: "dist"

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5

  release:
    name: Tag and release (CalVer)
    needs: [build, deploy]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: |
      github.event_name == 'push' &&
      !contains(github.event.head_commit.message, '[skip release]')
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Abort if tag already exists
        env:
          TAG: ${{ needs.build.outputs.version }}
        run: |
          set -euo pipefail
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists — aborting."
            exit 1
          fi

      - name: Create and push tag
        env:
          TAG: ${{ needs.build.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Generate release notes
        env:
          TAG: ${{ needs.build.outputs.version }}
        run: |
          set -euo pipefail
          prev="$(git tag --sort=-creatordate | grep -v "^${TAG}$" | head -n1 || true)"
          if [[ -z "$prev" ]]; then
            range="$(git rev-list --max-parents=0 HEAD | tail -n1)..HEAD"
          else
            range="${prev}..HEAD"
          fi
          {
            echo "## ${TAG}"
            echo
            echo "Built: ${{ needs.build.outputs.build_date }}"
            echo
            echo "### Changes"
            echo
            git log --pretty=format:'- %s (%h)' "$range" || echo "- (no user-facing commits)"
            echo
          } > release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.build.outputs.version }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file release-notes.md
